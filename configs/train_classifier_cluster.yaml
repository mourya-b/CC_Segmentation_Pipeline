data:
  base_dir: "/data/diag/mouryaBandaru/data/segmentations"
  dicom_dir: "/data/diag/rubenvdw/Dataset/DICOMS_Pectus"
  annotation_excel: "/data/diag/mouryaBandaru/data/CC_Annotations_M.xlsx"
